[project]
name = "gigachad-bot"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
    "fastapi>=0.136.3",
    "gpt-researcher>=0.15.1",
    "langchain-litellm>=0.6.0",
    "langchain-ollama>=0.3.0",
    "litellm>=1.80.5",
    "llm-baseclient @ git+https://github.com/patrickab/llm-baseclient.git@main",
    "mineru[all]>=2.6.0",
    "nodeenv>=1.10.0",
    "python-multipart>=0.0.18",
    "sse-starlette>=2.2.0",
    "uvicorn[standard]>=0.34.0",
]

[project.scripts]
gigachad-install = "src.backend.install_deps:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
target-version = "py312"
respect-gitignore = true
line-length = 135

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "B",   # bugbear
  "C4",  # comprehensions
  "TCH", # type-checking hygiene
  "SIM", # simplify
  "ANN", # type hints
  "ARG", # unused arguments
  "RUF"  # Ruff-native rules
]
ignore = [
  "TCH001",
  "TCH002",
  "RUF100",
  "B904"
]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["openai_client"]
section-order = ["standard-library", "third-party", "first-party", "local-folder"]

# Enables Ruff formatter with default options (Black-compatible)
[tool.ruff.format]
